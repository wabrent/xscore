<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter CV — Vibe</title>
    <link rel="icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0A0A0F;
            --bg-card: #12121A;
            --bg-card-hover: #1A1A24;
            --border: #2A2A3A;
            --text: #FFFFFF;
            --text-secondary: #8888AA;
            --text-muted: #555566;
            --accent: #6C5CE7;
            --accent-gradient: linear-gradient(135deg, #6C5CE7, #A29BFE);
            --green: #00D9A5;
            --pink: #FF6B9D;
            --cyan: #00D4FF;
            --radius: 24px;
            --radius-sm: 16px;
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #F5F5F7;
                --bg-card: #FFFFFF;
                --bg-card-hover: #FAFAFA;
                --border: #E5E5EA;
                --text: #1A1A1F;
                --text-secondary: #666677;
                --text-muted: #AAAABB;
                --accent-gradient: linear-gradient(135deg, #6C5CE7, #8B7CFF);
            }
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 60px 20px 80px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 48px;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .logo img {
            width: 36px;
            height: 36px;
            filter: brightness(0) invert(1);
        }
        
        header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        header p {
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        /* Search */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .search-box input {
            flex: 1;
            padding: 18px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }
        
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        
        .search-box button {
            padding: 18px 28px;
            background: var(--accent-gradient);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .search-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
        }
        
        /* Loading */
        .loading { display: none; padding: 48px; text-align: center; }
        .loading.active { display: block; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Error */
        .error { display: none; padding: 16px; background: rgba(255, 107, 157, 0.1); border: 1px solid var(--pink); border-radius: var(--radius); color: var(--pink); margin-bottom: 24px; text-align: center; font-size: 14px; }
        .error.active { display: block; }
        
        /* Results */
        .results { display: none; }
        .results.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Profile Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 20px;
        }
        
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        
        .profile-info h2 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .verified {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }
        
        .profile-info .username {
            font-size: 16px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .bio {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .stat {
            text-align: center;
            padding: 16px 8px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        
        /* Vibe Score */
        .vibe-card {
            background: var(--accent-gradient);
            border-radius: var(--radius);
            padding: 40px 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .vibe-score {
            font-size: 80px;
            font-weight: 700;
            color: white;
            line-height: 1;
        }
        
        .vibe-label {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
        }
        
        /* Section */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .content-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: var(--bg);
            border-radius: 12px;
        }
        
        .content-item .icon { font-size: 20px; }
        .content-item .name { font-size: 14px; font-weight: 500; flex: 1; }
        .content-item .score { font-size: 16px; font-weight: 700; color: var(--accent); }
        
        /* Times */
        .times-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .time-item {
            text-align: center;
            padding: 14px 8px;
            background: var(--bg);
            border-radius: 12px;
        }
        
        .time-item .time { font-size: 16px; font-weight: 600; }
        .time-item .score { font-size: 13px; color: var(--green); margin-top: 4px; }
        
        /* Audience */
        .audience-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }
        
        .audience-item .name { width: 70px; font-size: 14px; color: var(--text-secondary); }
        .audience-item .bar { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; }
        .audience-item .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
        .audience-item .percent { width: 40px; text-align: right; font-size: 14px; font-weight: 600; }
        
        /* Share */
        .share-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 24px;
        }
        
        .share-btn:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }
        
        @media (max-width: 480px) {
            .container { padding: 40px 16px 60px; }
            header h1 { font-size: 28px; }
            .vibe-score { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="logo.png" alt="Twitter CV">
            </div>
            <h1>Twitter CV</h1>
            <p>Your profile at a glance</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="username" placeholder="Enter username">
            <button id="analyzeBtn">Generate</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div style="color: var(--text-secondary); font-size: 14px;">Analyzing your profile...</div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <!-- Profile -->
            <div class="card">
                <div class="profile">
                    <img class="avatar" id="avatar" src="" alt="">
                    <div class="profile-info">
                        <h2><span id="name"></span><span class="verified" id="verified" style="display:none">✓</span></h2>
                        <div class="username">@<span id="handle"></span></div>
                    </div>
                </div>
                <div class="bio" id="bio"></div>
                
                <div class="stats">
                    <div class="stat"><div class="stat-value" id="followers">0</div><div class="stat-label">Followers</div></div>
                    <div class="stat"><div class="stat-value" id="following">0</div><div class="stat-label">Following</div></div>
                    <div class="stat"><div class="stat-value" id="tweets">0</div><div class="stat-label">Tweets</div></div>
                </div>
            </div>
            
            <!-- Vibe Score -->
            <div class="vibe-card">
                <div class="vibe-score" id="vibeScore">0</div>
                <div class="vibe-label">Your Vibe Score</div>
            </div>
            
            <!-- Engagement -->
            <div class="section">
                <div class="section-title">Engagement</div>
                <div class="stats">
                    <div class="stat"><div class="stat-value" id="engagement">0%</div><div class="stat-label">Eng Rate</div></div>
                    <div class="stat"><div class="stat-value" id="avgLikes">0</div><div class="stat-label">Avg Likes</div></div>
                    <div class="stat"><div class="stat-value" id="quality">0%</div><div class="stat-label">Quality</div></div>
                </div>
            </div>
            
            <!-- Content -->
            <div class="section">
                <div class="section-title">Content</div>
                <div class="content-grid" id="contentMix"></div>
            </div>
            
            <!-- Times -->
            <div class="section">
                <div class="section-title">Best Times</div>
                <div class="times-grid" id="bestTimes"></div>
            </div>
            
            <!-- Audience -->
            <div class="section">
                <div class="section-title">Audience</div>
                <div class="audience-list" id="audience"></div>
            </div>
            
            <button class="share-btn" id="shareBtn">Share Your CV</button>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('username');
        const btn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        
        function fmt(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n);
        }
        
        function setTxt(id, v) { const e = document.getElementById(id); if (e) e.textContent = v; }
        
        async function analyze() {
            const username = input.value.trim().replace('@', '');
            if (!username) return;
            
            error.classList.remove('active');
            loading.classList.add('active');
            results.classList.remove('active');
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                
                if (!res.ok) throw new Error('User not found');
                const d = await res.json();
                
                document.getElementById('avatar').src = d.avatar_url || '';
                setTxt('name', d.display_name);
                setTxt('handle', d.username);
                document.getElementById('verified').style.display = d.verified ? 'flex' : 'none';
                setTxt('bio', d.bio || '');
                
                animateValue('followers', d.followers);
                animateValue('following', d.following);
                animateValue('tweets', d.tweets);
                
                const vs = document.getElementById('vibeScore');
                animateValueSimple(vs, d.vibe_score, '');
                
                setTxt('engagement', d.engagement + '%');
                setTxt('avgLikes', d.avg_likes_per_tweet);
                setTxt('quality', d.quality + '%');
                
                const cm = document.getElementById('contentMix');
                cm.innerHTML = d.content_mix.map(c => `
                    <div class="content-item">
                        <span class="icon">${c.icon}</span>
                        <span class="name">${c.type}</span>
                        <span class="score">${c.score}%</span>
                    </div>
                `).join('');
                
                const bt = document.getElementById('bestTimes');
                bt.innerHTML = d.best_times.map(t => `
                    <div class="time-item">
                        <div class="time">${t.time}</div>
                        <div class="score">${t.score}%</div>
                    </div>
                `).join('');
                
                const au = document.getElementById('audience');
                au.innerHTML = d.audience.map(a => `
                    <div class="audience-item">
                        <span class="name">${a.segment}</span>
                        <div class="bar"><div class="bar-fill" style="width:${a.percent}%"></div></div>
                        <span class="percent">${a.percent}%</span>
                    </div>
                `).join('');
                
                loading.classList.remove('active');
                results.classList.add('active');
                
            } catch (e) {
                loading.classList.remove('active');
                error.textContent = e.message || 'Error';
                error.classList.add('active');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate';
            }
        }
        
        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 20, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = fmt(target); clearInterval(timer); }
                else { el.textContent = fmt(Math.floor(current)); }
            }, 20);
        }
        
        function animateValueSimple(el, target, suffix) {
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 15, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = target + suffix; clearInterval(timer); }
                else { el.textContent = Math.floor(current) + suffix; }
            }, 15);
        }
        
        btn.addEventListener('click', analyze);
        input.addEventListener('keypress', e => { if (e.key === 'Enter') analyze(); });
        
        document.getElementById('shareBtn').addEventListener('click', () => {
            const vs = document.getElementById('vibeScore').textContent;
            const text = `My Twitter Vibe Score: ${vs}`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        });
    </script>
</body>
</html>
