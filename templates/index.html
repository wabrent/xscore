<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral — Predict Your Tweets</title>
    <link rel="icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0A0A0F;
            --bg-card: #12121A;
            --bg-card-hover: #1A1A24;
            --border: #2A2A3A;
            --text: #FFFFFF;
            --text-secondary: #8888AA;
            --text-muted: #555566;
            --accent: #6C5CE7;
            --accent-gradient: linear-gradient(135deg, #6C5CE7, #A29BFE);
            --green: #00D9A5;
            --pink: #FF6B9D;
            --yellow: #FFD93D;
            --cyan: #00D4FF;
            --radius: 24px;
            --radius-sm: 16px;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 107, 157, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 48px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .logo img { width: 36px; height: 36px; filter: brightness(0) invert(1); }
        
        header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        header p {
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
        }
        
        .tab {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--accent);
            color: white;
        }
        
        .tab:not(.active):hover {
            background: var(--bg-card-hover);
            color: var(--text);
        }
        
        /* Section */
        .section { display: none; }
        .section.active { display: block; }
        
        /* Search */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .search-box input {
            flex: 1;
            padding: 18px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }
        
        .search-box button {
            padding: 18px 24px;
            background: var(--accent-gradient);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .search-box button:hover { transform: scale(1.02); }
        
        .search-box button:disabled { opacity: 0.5; transform: none; }
        
        /* Compare Search */
        .compare-box {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .compare-box input {
            padding: 18px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            text-align: center;
        }
        
        .vs {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }
        
        /* Loading */
        .loading { display: none; padding: 48px; text-align: center; }
        .loading.active { display: block; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Error */
        .error { display: none; padding: 16px; background: rgba(255, 107, 157, 0.1); border: 1px solid var(--pink); border-radius: var(--radius); color: var(--pink); margin-bottom: 24px; text-align: center; font-size: 14px; }
        .error.active { display: block; }
        
        /* Results */
        .results { display: none; }
        .results.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        
        /* Profile */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        
        .profile-info h2 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .verified { width: 18px; height: 18px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }
        .profile-info .username { font-size: 15px; color: var(--text-secondary); margin-top: 4px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat { text-align: center; padding: 14px 8px; background: var(--bg); border-radius: 12px; }
        .stat-value { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        
        /* Score Card */
        .score-card {
            background: var(--accent-gradient);
            border-radius: var(--radius);
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .score-value { font-size: 72px; font-weight: 700; color: white; line-height: 1; }
        .score-label { font-size: 13px; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; }
        
        .score-bar { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .score-bar-fill { height: 100%; background: white; border-radius: 3px; transition: width 0.6s ease; }
        
        /* Compare Result */
        .compare-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        
        .compare-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .compare-user { text-align: center; }
        .compare-user .avatar { width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 8px; border-color: var(--green); }
        .compare-user .name { font-size: 16px; font-weight: 600; }
        .compare-vs { font-size: 24px; font-weight: 700; color: var(--accent); }
        
        .compare-stats { display: grid; gap: 12px; }
        .compare-stat {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
            align-items: center;
        }
        
        .compare-stat .val { font-size: 18px; font-weight: 700; text-align: center; }
        .compare-stat .label { font-size: 13px; color: var(--text-muted); text-align: center; }
        .compare-stat .winner { color: var(--green); }
        
        /* Predictor */
        .predict-input {
            width: 100%;
            padding: 18px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            min-height: 120px;
            resize: vertical;
            outline: none;
            margin-bottom: 16px;
        }
        
        .predict-input:focus { border-color: var(--accent); }
        
        .predict-result {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
        }
        
        .predict-score { font-size: 64px; font-weight: 700; margin-bottom: 8px; }
        .predict-score.high { color: var(--green); }
        .predict-score.medium { color: var(--yellow); }
        .predict-score.low { color: var(--pink); }
        
        .predict-verdict { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        
        .factors {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            text-align: left;
        }
        
        .factor {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 13px;
        }
        
        .factor .icon { font-size: 16px; }
        
        .tips {
            margin-top: 20px;
            padding: 16px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 12px;
            text-align: left;
        }
        
        .tips-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
        .tips-list { font-size: 14px; color: var(--text-secondary); }
        
        @media (max-width: 480px) {
            .compare-box { grid-template-columns: 1fr; }
            .compare-box .vs { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><img src="logo.png" alt="Viral"></div>
            <h1>Viral</h1>
            <p>Predict your Twitter success</p>
        </header>
        
        <div class="tabs">
            <button class="tab active" data-tab="analyze">Analyze</button>
            <button class="tab" data-tab="compare">Compare</button>
            <button class="tab" data-tab="predict">Predict</button>
        </div>
        
        <!-- Analyze Section -->
        <div class="section active" id="analyze">
            <div class="search-box">
                <input type="text" id="username" placeholder="Enter username">
                <button id="analyzeBtn">Analyze</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <div style="color: var(--text-secondary); font-size: 14px;">Analyzing...</div>
            </div>
            
            <div class="error" id="error"></div>
            
            <div class="results" id="results">
                <div class="card">
                    <div class="profile">
                        <img class="avatar" id="avatar" src="" alt="">
                        <div class="profile-info">
                            <h2><span id="name"></span><span class="verified" id="verified" style="display:none">✓</span></h2>
                            <div class="username">@<span id="handle"></span></div>
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-value" id="followers">0</div><div class="stat-label">Followers</div></div>
                        <div class="stat"><div class="stat-value" id="following">0</div><div class="stat-label">Following</div></div>
                        <div class="stat"><div class="stat-value" id="tweets">0</div><div class="stat-label">Tweets</div></div>
                    </div>
                </div>
                
                <div class="score-card">
                    <div class="score-value" id="viralScore">0</div>
                    <div class="score-label">Viral Score</div>
                    <div class="score-bar"><div class="score-bar-fill" id="viralBar"></div></div>
                </div>
                
                <div class="card">
                    <div class="stats">
                        <div class="stat"><div class="stat-value" id="engagement">0%</div><div class="stat-label">Engagement</div></div>
                        <div class="stat"><div class="stat-value" id="avgLikes">0</div><div class="stat-label">Avg Likes</div></div>
                        <div class="stat"><div class="stat-value" id="quality">0%</div><div class="stat-label">Quality</div></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Compare Section -->
        <div class="section" id="compare">
            <div class="compare-box">
                <input type="text" id="user1" placeholder="Your username">
                <span class="vs">VS</span>
                <input type="text" id="user2" placeholder="Competitor username">
            </div>
            
            <button id="compareBtn" style="width: 100%; padding: 18px; background: var(--accent-gradient); border: none; border-radius: var(--radius); color: white; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 24px;">Compare</button>
            
            <div class="compare-result" id="compareResult" style="display: none;">
                <div class="compare-card">
                    <div class="compare-header">
                        <div class="compare-user">
                            <img class="avatar" id="avatar1" src="" alt="">
                            <div class="name" id="name1"></div>
                        </div>
                        <div class="compare-vs">VS</div>
                        <div class="compare-user">
                            <img class="avatar" id="avatar2" src="" alt="">
                            <div class="name" id="name2"></div>
                        </div>
                    </div>
                    
                    <div class="compare-stats">
                        <div class="compare-stat">
                            <div class="val" id="followers1">0</div>
                            <div class="label">Followers</div>
                            <div class="val" id="followers2">0</div>
                        </div>
                        <div class="compare-stat">
                            <div class="val" id="engage1">0%</div>
                            <div class="label">Engagement</div>
                            <div class="val" id="engage2">0%</div>
                        </div>
                        <div class="compare-stat">
                            <div class="val" id="viral1">0</div>
                            <div class="label">Viral Score</div>
                            <div class="val" id="viral2">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Predict Section -->
        <div class="section" id="predict">
            <textarea class="predict-input" id="tweetText" placeholder="Write your tweet here..."></textarea>
            <button id="predictBtn" style="width: 100%; padding: 18px; background: var(--accent-gradient); border: none; border-radius: var(--radius); color: white; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 24px;">Predict</button>
            
            <div class="predict-result" id="predictResult" style="display: none;">
                <div class="predict-score" id="predictScore">0</div>
                <div class="predict-verdict" id="predictVerdict">LOW</div>
                
                <div class="factors" id="factors"></div>
                
                <div class="tips" id="tips" style="display: none;">
                    <div class="tips-title">Tips to go viral:</div>
                    <div class="tips-list" id="tipsList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.section');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
        
        // Analyze
        const analyzeInput = document.getElementById('username');
        const analyzeBtn = document.getElementById('analyzeBtn');
        
        async function analyze() {
            const username = analyzeInput.value.trim().replace('@', '');
            if (!username) return;
            
            showLoading();
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                
                if (!res.ok) throw new Error('User not found');
                const d = await res.json();
                
                document.getElementById('avatar').src = d.avatar_url || '';
                document.getElementById('name').textContent = d.display_name;
                document.getElementById('handle').textContent = d.username;
                document.getElementById('verified').style.display = d.verified ? 'flex' : 'none';
                
                animateValue('followers', d.followers);
                animateValue('following', d.following);
                animateValue('tweets', d.tweets);
                
                const vs = document.getElementById('viralScore');
                animateValueSimple(vs, d.viral_score, '');
                document.getElementById('viralBar').style.width = d.viral_score + '%';
                
                document.getElementById('engagement').textContent = d.engagement_rate + '%';
                document.getElementById('avgLikes').textContent = d.avg_likes;
                document.getElementById('quality').textContent = d.quality + '%';
                
                showResults();
            } catch (e) {
                showError(e.message);
            }
        }
        
        analyzeBtn.addEventListener('click', analyze);
        analyzeInput.addEventListener('keypress', e => { if (e.key === 'Enter') analyze(); });
        
        // Compare
        const compareBtn = document.getElementById('compareBtn');
        const user1Input = document.getElementById('user1');
        const user2Input = document.getElementById('user2');
        
        async function compare() {
            const u1 = user1Input.value.trim().replace('@', '');
            const u2 = user2Input.value.trim().replace('@', '');
            if (!u1 || !u2) return;
            
            showLoading();
            
            try {
                const res = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user1: u1, user2: u2 })
                });
                
                if (!res.ok) throw new Error('User not found');
                const d = await res.json();
                
                document.getElementById('avatar1').src = d.user1.avatar_url || '';
                document.getElementById('name1').textContent = d.user1.username;
                document.getElementById('avatar2').src = d.user2.avatar_url || '';
                document.getElementById('name2').textContent = d.user2.username;
                
                document.getElementById('followers1').textContent = fmt(d.user1.followers);
                document.getElementById('followers2').textContent = fmt(d.user2.followers);
                document.getElementById('followers1').classList.toggle('winner', d.winner.followers);
                document.getElementById('followers2').classList.toggle('winner', d.winner.followers);
                
                document.getElementById('engage1').textContent = d.user1.engagement_rate + '%';
                document.getElementById('engage2').textContent = d.user2.engagement_rate + '%';
                
                document.getElementById('viral1').textContent = d.user1.viral_score;
                document.getElementById('viral2').textContent = d.user2.viral_score;
                
                document.getElementById('compareResult').style.display = 'block';
                hideLoading();
            } catch (e) {
                showError(e.message);
            }
        }
        
        compareBtn.addEventListener('click', compare);
        
        // Predict
        const tweetInput = document.getElementById('tweetText');
        const predictBtn = document.getElementById('predictBtn');
        
        async function predict() {
            const username = analyzeInput.value.trim().replace('@', '') || tweetInput.dataset.user;
            const content = tweetInput.value;
            
            if (!content) return;
            
            showLoading();
            
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, content })
                });
                
                if (!res.ok) throw new Error('Error');
                const d = await res.json();
                
                const scoreEl = document.getElementById('predictScore');
                scoreEl.textContent = d.score;
                scoreEl.className = 'predict-score ' + d.verdict.toLowerCase();
                
                document.getElementById('predictVerdict').textContent = d.verdict + ' POTENTIAL';
                document.getElementById('predictVerdict').style.color = d.verdict === 'HIGH' ? 'var(--green)' : d.verdict === 'MEDIUM' ? 'var(--yellow)' : 'var(--pink)';
                
                const factors = document.getElementById('factors');
                factors.innerHTML = `
                    <div class="factor"><span class="icon">${d.factors.has_hashtags ? '✅' : '❌'}</span>Hashtags</div>
                    <div class="factor"><span class="icon">${d.factors.has_mentions ? '✅' : '❌'}</span>Mentions</div>
                    <div class="factor"><span class="icon">${d.factors.good_length ? '✅' : '❌'}</span>Good length</div>
                    <div class="factor"><span class="icon">${d.factors.has_emoji ? '✅' : '❌'}</span>Emoji</div>
                    <div class="factor"><span class="icon">${d.factors.has_link ? '✅' : '❌'}</span>Link</div>
                `;
                
                if (d.tips.length > 0) {
                    document.getElementById('tips').style.display = 'block';
                    document.getElementById('tipsList').innerHTML = d.tips.map(t => '• ' + t).join('<br>');
                } else {
                    document.getElementById('tips').style.display = 'none';
                }
                
                document.getElementById('predictResult').style.display = 'block';
                hideLoading();
            } catch (e) {
                showError(e.message);
            }
        }
        
        predictBtn.addEventListener('click', predict);
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('error').classList.remove('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('compareResult').style.display = 'none';
            document.getElementById('predictResult').style.display = 'none';
            analyzeBtn.disabled = compareBtn.disabled = predictBtn.disabled = true;
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            analyzeBtn.disabled = compareBtn.disabled = predictBtn.disabled = false;
        }
        
        function showError(msg) {
            hideLoading();
            document.getElementById('error').textContent = msg;
            document.getElementById('error').classList.add('active');
        }
        
        function showResults() {
            hideLoading();
            document.getElementById('results').classList.add('active');
        }
        
        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 20, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = fmt(target); clearInterval(timer); }
                else { el.textContent = fmt(Math.floor(current)); }
            }, 20);
        }
        
        function animateValueSimple(el, target, suffix) {
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 15, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = target + suffix; clearInterval(timer); }
                else { el.textContent = Math.floor(current) + suffix; }
            }, 15);
        }
        
        function fmt(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n);
        }
    </script>
</body>
</html>
