<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSCORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020202;
            --amber: #FFC107;
            --blue: #00BFFF;
            --text: #FFFFFF;
            --text-dim: #666666;
            --border: #1a1a1a;
            --glow-amber: 0 0 20px rgba(255, 193, 7, 0.4);
            --glow-blue: 0 0 20px rgba(0, 191, 255, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 48px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 48px;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 400;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--amber);
            letter-spacing: 10px;
        }
        
        .nav {
            display: flex;
            gap: 32px;
        }
        
        .nav-item {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
            text-transform: uppercase;
        }
        
        .nav-item:hover, .nav-item.active {
            color: var(--amber);
            text-shadow: var(--glow-amber);
        }
        
        /* Main layout */
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 64px;
        }
        
        /* Sidebar */
        .sidebar {
            padding-top: 16px;
        }
        
        .stat {
            margin-bottom: 32px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--amber);
            text-shadow: var(--glow-amber);
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .scale {
            margin-top: 40px;
        }
        
        .scale-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        
        .scale-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .scale-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--amber));
            box-shadow: var(--glow-amber);
        }
        
        /* Content */
        .content {
            min-height: 400px;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        .input-group label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--amber);
            box-shadow: 0 2px 0 var(--amber);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--amber);
            color: var(--amber);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .btn:hover {
            background: var(--amber);
            color: var(--bg);
            box-shadow: var(--glow-amber);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Results */
        .result-card {
            margin-top: 32px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .avatar {
            width: 64px;
            height: 64px;
            border: 2px solid var(--blue);
            box-shadow: var(--glow-blue);
            object-fit: cover;
        }
        
        .user-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
        }
        
        .user-info .username {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            font-family: 'Space Mono', monospace;
        }
        
        .verified {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: var(--amber);
            color: var(--bg);
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            line-height: 20px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .stat-box {
            text-align: center;
        }
        
        .stat-box .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        
        .stat-box .label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        /* Compare */
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            gap: 24px;
            align-items: center;
        }
        
        .compare-vs {
            text-align: center;
            font-size: 18px;
            color: var(--amber);
            text-shadow: var(--glow-amber);
        }
        
        .compare-user {
            text-align: center;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .compare-user img {
            width: 56px;
            height: 56px;
            border: 2px solid var(--blue);
            margin-bottom: 12px;
        }
        
        .compare-user .name {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
        }
        
        /* Score display */
        .score-display {
            text-align: center;
            padding: 48px;
            margin: 32px 0;
        }
        
        .score-value {
            font-size: 96px;
            font-weight: 700;
            color: var(--amber);
            text-shadow: var(--glow-amber);
            line-height: 1;
        }
        
        .score-label {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-top: 16px;
        }
        
        /* Loading */
        .loading { display: none; text-align: center; padding: 48px; }
        .loading.active { display: block; }
        
        .spinner {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        
        .error {
            display: none;
            padding: 12px;
            border: 1px solid #ff3333;
            color: #ff3333;
            margin-top: 16px;
            font-size: 11px;
        }
        .error.active { display: block; }
        
        @media (max-width: 700px) {
            .main { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 24px; }
            .compare-grid { grid-template-columns: 1fr; }
            .compare-vs { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">XSCORE</div>
            <nav class="nav">
                <div class="nav-item active" data-tab="analyze">Analyze</div>
                <div class="nav-item" data-tab="compare">Compare</div>
                <div class="nav-item" data-tab="predict">Predict</div>
            </nav>
        </header>
        
        <div class="main">
            <aside class="sidebar">
                <div class="stat">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">FOLLOWERS</div>
                </div>
                
                <div class="stat">
                    <div class="stat-value" id="viralScore">0</div>
                    <div class="stat-label">VIRAL SCORE</div>
                </div>
                
                <div class="scale">
                    <div class="scale-header">
                        <span>COLD</span>
                        <span>HOT</span>
                    </div>
                    <div class="scale-bar">
                        <div class="scale-fill" id="scaleFill" style="width: 0%"></div>
                    </div>
                </div>
            </aside>
            
            <div class="content">
                <!-- Analyze -->
                <div class="section active" id="analyze">
                    <div class="input-group">
                        <label>USERNAME</label>
                        <input type="text" id="username" placeholder="@handle">
                    </div>
                    <button class="btn" id="analyzeBtn">Analyze</button>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div class="loading-text">PROCESSING</div>
                    </div>
                    
                    <div class="error" id="error"></div>
                    
                    <div class="result-card" id="result" style="display: none;">
                        <div class="result-header">
                            <img class="avatar" id="avatar" src="">
                            <div class="user-info">
                                <h3><span id="name"></span><span class="verified" id="verified" style="display: none;">✓</span></h3>
                                <div class="username">@<span id="handle"></span></div>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="value" id="engagement">0%</div>
                                <div class="label">ENGAGEMENT</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="avgLikes">0</div>
                                <div class="label">AVG LIKES</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="quality">0%</div>
                                <div class="label">QUALITY</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Compare -->
                <div class="section" id="compare">
                    <div class="compare-grid" style="margin-bottom: 24px;">
                        <div class="input-group">
                            <label>USER A</label>
                            <input type="text" id="user1" placeholder="@you">
                        </div>
                        <div class="compare-vs">VS</div>
                        <div class="input-group">
                            <label>USER B</label>
                            <input type="text" id="user2" placeholder="@them">
                        </div>
                    </div>
                    <button class="btn" id="compareBtn">Compare</button>
                    
                    <div class="result-card" id="compareResult" style="display: none; margin-top: 24px;">
                        <div class="compare-grid">
                            <div class="compare-user">
                                <img id="avatar1" src="">
                                <div class="name" id="name1"></div>
                            </div>
                            <div class="compare-vs">VS</div>
                            <div class="compare-user">
                                <img id="avatar2" src="">
                                <div class="name" id="name2"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Predict -->
                <div class="section" id="predict">
                    <div class="input-group">
                        <label>OPERATOR</label>
                        <input type="text" id="predictUser" placeholder="@username">
                    </div>
                    <div class="input-group">
                        <label>PAYLOAD</label>
                        <textarea id="tweetText" placeholder="Your tweet..." rows="4"></textarea>
                    </div>
                    <button class="btn" id="predictBtn">Predict</button>
                    
                    <div class="score-display" id="predictResult" style="display: none;">
                        <div class="score-value" id="predictScore">0</div>
                        <div class="score-label">VIRAL POTENTIAL</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('.section');
        
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.tab).classList.add('active');
            });
        });
        
        function fmt(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n);
        }
        
        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 20, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = fmt(target); clearInterval(timer); }
                else { el.textContent = fmt(Math.floor(current)); }
            }, 20);
        }
        
        async function analyze() {
            const username = document.getElementById('username').value.trim().replace('@', '');
            if (!username) return;
            
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                
                if (!res.ok) throw new Error('NOT_FOUND');
                const d = await res.json();
                
                document.getElementById('avatar').src = d.avatar_url || '';
                document.getElementById('name').textContent = d.display_name;
                document.getElementById('handle').textContent = d.username;
                document.getElementById('verified').style.display = d.verified ? 'inline-block' : 'none';
                
                animateValue('followers', d.followers);
                animateValue('viralScore', d.viral_score);
                document.getElementById('scaleFill').style.width = d.viral_score + '%';
                
                document.getElementById('engagement').textContent = d.engagement_rate + '%';
                document.getElementById('avgLikes').textContent = d.avg_likes;
                document.getElementById('quality').textContent = d.quality + '%';
                
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = 'ERROR: ' + e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('loading').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = false;
        }
        
        document.getElementById('analyzeBtn').addEventListener('click', analyze);
        document.getElementById('username').addEventListener('keypress', e => { if (e.key === 'Enter') analyze(); });
        
        async function compare() {
            const u1 = document.getElementById('user1').value.trim().replace('@', '');
            const u2 = document.getElementById('user2').value.trim().replace('@', '');
            if (!u1 || !u2) return;
            
            document.getElementById('compareBtn').disabled = true;
            
            try {
                const res = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user1: u1, user2: u2 })
                });
                
                if (!res.ok) throw new Error('NOT_FOUND');
                const d = await res.json();
                
                document.getElementById('avatar1').src = d.user1.avatar_url || '';
                document.getElementById('name1').textContent = d.user1.username;
                document.getElementById('avatar2').src = d.user2.avatar_url || '';
                document.getElementById('name2').textContent = d.user2.username;
                
                document.getElementById('compareResult').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = 'ERROR: ' + e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('compareBtn').disabled = false;
        }
        
        document.getElementById('compareBtn').addEventListener('click', compare);
        
        async function predict() {
            const predictUser = document.getElementById('predictUser').value.trim().replace('@', '') || 'user';
            const content = document.getElementById('tweetText').value;
            if (!content) return;
            
            document.getElementById('predictBtn').disabled = true;
            
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: predictUser, content })
                });
                
                const d = await res.json();
                
                document.getElementById('predictScore').textContent = d.score;
                document.getElementById('predictResult').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = 'ERROR: ' + e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('predictBtn').disabled = false;
        }
        
        document.getElementById('predictBtn').addEventListener('click', predict);
    </script>
</body>
</html>
