<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSCORE — Viral Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --amber: #E89E2D;
            --royal: #2B3D8F;
            --text: #F5F5F5;
            --text-dim: #888888;
            --border: #1a1a1a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Film grain overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.08;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        
        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid var(--border);
            position: relative;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: transparent;
            -webkit-text-stroke: 1px var(--amber);
            letter-spacing: 4px;
        }
        
        .nav {
            display: flex;
            gap: 0;
        }
        
        .nav-item {
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-left: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            color: var(--amber);
            background: rgba(232, 158, 45, 0.05);
        }
        
        /* Main layout */
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 24px;
        }
        
        /* Sidebar */
        .sidebar {
            border: 1px solid var(--border);
            padding: 16px;
        }
        
        .sidebar-title {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }
        
        .stat {
            margin-bottom: 20px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--amber);
            line-height: 1;
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        
        .scale {
            margin-top: 24px;
        }
        
        .scale-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        
        .scale-bar {
            height: 4px;
            background: var(--border);
            position: relative;
        }
        
        .scale-fill {
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--royal), var(--amber));
        }
        
        /* Content */
        .content {
            border: 1px solid var(--border);
            padding: 24px;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--amber);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--amber);
            color: var(--amber);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: var(--amber);
            color: var(--bg);
        }
        
        /* Results */
        .result-card {
            border: 1px solid var(--border);
            padding: 20px;
            margin-top: 20px;
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border: 1px solid var(--amber);
            object-fit: cover;
        }
        
        .user-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
        }
        
        .user-info .username {
            font-size: 12px;
            color: var(--text-dim);
        }
        
        .verified {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: var(--amber);
            color: var(--bg);
            font-size: 10px;
            text-align: center;
            line-height: 16px;
            margin-left: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .stat-box {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: center;
        }
        
        .stat-box .value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .stat-box .label {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        
        /* Score display */
        .score-display {
            text-align: center;
            padding: 40px;
            border: 1px solid var(--border);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .score-display::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232, 158, 45, 0.1));
        }
        
        .score-value {
            font-size: 72px;
            font-weight: 700;
            color: var(--amber);
        }
        
        .score-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        
        /* Compare */
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 80px 1fr;
            gap: 16px;
            align-items: center;
        }
        
        .compare-vs {
            text-align: center;
            font-size: 12px;
            color: var(--amber);
        }
        
        .compare-user {
            text-align: center;
            padding: 16px;
            border: 1px solid var(--border);
        }
        
        .compare-user img {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }
        
        /* Dictionary style */
        .dict {
            margin-top: 24px;
            font-size: 11px;
        }
        
        .dict-term {
            color: var(--amber);
            font-weight: 700;
        }
        
        .dict-def {
            color: var(--text-dim);
            margin-left: 8px;
        }
        
        /* Footer */
        footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-dim);
        }
        
        /* Loading */
        .loading { display: none; }
        .loading.active { display: block; text-align: center; padding: 40px; }
        
        .spinner {
            width: 40px; height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error {
            display: none;
            padding: 12px;
            border: 1px solid #ff3333;
            color: #ff3333;
            margin-top: 16px;
        }
        .error.active { display: block; }
        
        @media (max-width: 700px) {
            .main { grid-template-columns: 1fr; }
            .compare-grid { grid-template-columns: 1fr; }
            .compare-vs { display: none; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="scanlines"></div>
    
    <div class="container">
        <header>
            <div class="logo">XSCORE</div>
            <nav class="nav">
                <div class="nav-item active" data-tab="analyze">Analyze</div>
                <div class="nav-item" data-tab="compare">Compare</div>
                <div class="nav-item" data-tab="predict">Predict</div>
            </nav>
        </header>
        
        <div class="main">
            <aside class="sidebar">
                <div class="sidebar-title">DATA SHEET</div>
                
                <div class="stat">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">FOLLOWERS</div>
                </div>
                
                <div class="stat">
                    <div class="stat-value" id="viralScore">0</div>
                    <div class="stat-label">VIRAL INDEX</div>
                </div>
                
                <div class="scale">
                    <div class="scale-header">
                        <span>COLD</span>
                        <span>HOT</span>
                    </div>
                    <div class="scale-bar">
                        <div class="scale-fill" id="scaleFill" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="dict">
                    <div><span class="dict-term">RETINA</span><span class="dict-def">[noun] Display metric</span></div>
                    <div><span class="dict-term">PUPIL</span><span class="dict-def">[noun] Entry point</span></div>
                </div>
            </aside>
            
            <div class="content">
                <!-- Analyze -->
                <div class="section active" id="analyze">
                    <div class="input-group">
                        <label>USERNAME</label>
                        <input type="text" id="username" placeholder="@username">
                    </div>
                    <button class="btn" id="analyzeBtn">ANALYZE</button>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div>PROCESSING...</div>
                    </div>
                    
                    <div class="error" id="error"></div>
                    
                    <div class="result-card" id="result">
                        <div class="result-header">
                            <img class="avatar" id="avatar" src="">
                            <div class="user-info">
                                <h3><span id="name"></span><span class="verified" id="verified" style="display:none">✓</span></h3>
                                <div class="username">@<span id="handle"></span></div>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="value" id="engagement">0%</div>
                                <div class="label">ENG RATE</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="avgLikes">0</div>
                                <div class="label">AVG LIKES</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="quality">0%</div>
                                <div class="label">QUALITY</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Compare -->
                <div class="section" id="compare">
                    <div class="compare-grid" style="margin-bottom: 20px;">
                        <div class="input-group">
                            <label>YOUR USERNAME</label>
                            <input type="text" id="user1" placeholder="@you">
                        </div>
                        <div class="compare-vs">VS</div>
                        <div class="input-group">
                            <label>COMPETITOR</label>
                            <input type="text" id="user2" placeholder="@them">
                        </div>
                    </div>
                    <button class="btn" id="compareBtn">COMPARE</button>
                    
                    <div class="result-card" id="compareResult" style="display:none;">
                        <div class="compare-grid">
                            <div class="compare-user">
                                <img class="avatar" id="avatar1" src="">
                                <div class="username" id="name1"></div>
                            </div>
                            <div class="compare-vs">VS</div>
                            <div class="compare-user">
                                <img class="avatar" id="avatar2" src="">
                                <div class="username" id="name2"></div>
                            </div>
                        </div>
                        <div class="stats-grid" style="margin-top: 16px;">
                            <div class="stat-box">
                                <div class="value" id="followers1">0</div>
                                <div class="label">FOLLOWERS</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="viral1">0</div>
                                <div class="label">VIRAL</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="engage1">0%</div>
                                <div class="label">ENG</div>
                            </div>
                        </div>
                        <div class="stats-grid" style="margin-top: 8px;">
                            <div class="stat-box">
                                <div class="value" id="followers2">0</div>
                                <div class="label">FOLLOWERS</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="viral2">0</div>
                                <div class="label">VIRAL</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="engage2">0%</div>
                                <div class="label">ENG</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Predict -->
                <div class="section" id="predict">
                    <div class="input-group">
                        <label>USERNAME</label>
                        <input type="text" id="predictUser" placeholder="@username">
                    </div>
                    <div class="input-group">
                        <label>TWEET CONTENT</label>
                        <textarea id="tweetText" placeholder="Your tweet..." rows="4"></textarea>
                    </div>
                    <button class="btn" id="predictBtn">PREDICT</button>
                    
                    <div class="score-display" id="predictResult" style="display:none;">
                        <div class="score-value" id="predictScore">0</div>
                        <div class="score-label">VIRAL POTENTIAL</div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <span>v1.0.0 // XSCORE</span>
            <span>5128</span>
        </footer>
    </div>
    
    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('.section');
        
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.tab).classList.add('active');
            });
        });
        
        function fmt(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n);
        }
        
        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 20, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = fmt(target); clearInterval(timer); }
                else { el.textContent = fmt(Math.floor(current)); }
            }, 20);
        }
        
        async function analyze() {
            const username = document.getElementById('username').value.trim().replace('@', '');
            if (!username) return;
            
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                
                if (!res.ok) throw new Error('User not found');
                const d = await res.json();
                
                document.getElementById('avatar').src = d.avatar_url || '';
                document.getElementById('name').textContent = d.display_name;
                document.getElementById('handle').textContent = d.username;
                document.getElementById('verified').style.display = d.verified ? 'inline-block' : 'none';
                
                animateValue('followers', d.followers);
                animateValue('viralScore', d.viral_score);
                document.getElementById('scaleFill').style.width = d.viral_score + '%';
                
                document.getElementById('engagement').textContent = d.engagement_rate + '%';
                document.getElementById('avgLikes').textContent = d.avg_likes;
                document.getElementById('quality').textContent = d.quality + '%';
                
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('loading').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = false;
        }
        
        document.getElementById('analyzeBtn').addEventListener('click', analyze);
        document.getElementById('username').addEventListener('keypress', e => { if (e.key === 'Enter') analyze(); });
        
        async function compare() {
            const u1 = document.getElementById('user1').value.trim().replace('@', '');
            const u2 = document.getElementById('user2').value.trim().replace('@', '');
            if (!u1 || !u2) return;
            
            document.getElementById('compareBtn').disabled = true;
            
            try {
                const res = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user1: u1, user2: u2 })
                });
                
                if (!res.ok) throw new Error('User not found');
                const d = await res.json();
                
                document.getElementById('avatar1').src = d.user1.avatar_url || '';
                document.getElementById('name1').textContent = d.user1.username;
                document.getElementById('avatar2').src = d.user2.avatar_url || '';
                document.getElementById('name2').textContent = d.user2.username;
                
                document.getElementById('followers1').textContent = fmt(d.user1.followers);
                document.getElementById('followers2').textContent = fmt(d.user2.followers);
                document.getElementById('viral1').textContent = d.user1.viral_score;
                document.getElementById('viral2').textContent = d.user2.viral_score;
                document.getElementById('engage1').textContent = d.user1.engagement_rate + '%';
                document.getElementById('engage2').textContent = d.user2.engagement_rate + '%';
                
                document.getElementById('compareResult').style.display = 'block';
            } catch (e) {
                alert(e.message);
            }
            
            document.getElementById('compareBtn').disabled = false;
        }
        
        document.getElementById('compareBtn').addEventListener('click', compare);
        
        async function predict() {
            const predictUser = document.getElementById('predictUser').value.trim().replace('@', '') || 'user';
            const content = document.getElementById('tweetText').value;
            if (!content) return;
            
            document.getElementById('predictBtn').disabled = true;
            
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: predictUser, content })
                });
                
                const d = await res.json();
                
                document.getElementById('predictScore').textContent = d.score;
                document.getElementById('predictResult').style.display = 'block';
            } catch (e) {
                alert(e.message);
            }
            
            document.getElementById('predictBtn').disabled = false;
        }
        
        document.getElementById('predictBtn').addEventListener('click', predict);
    </script>
</body>
</html>
