<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSCORE — Viral Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --amber: #D98324;
            --amber-dim: #8B5A1C;
            --royal: #2B3D8F;
            --text: #E0E0E0;
            --text-dim: #666666;
            --border: #1a1a1a;
            --grid: #0f0f0f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Heavy film grain */
        .noise {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.12;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        
        /* Vignette */
        .vignette {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9997;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
        }
        
        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                rgba(0,0,0,0.15) 1px,
                rgba(0,0,0,0.15) 2px
            );
        }
        
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0;
            position: relative;
        }
        
        /* Grid lines */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            background: 
                linear-gradient(90deg, var(--grid) 1px, transparent 1px),
                linear-gradient(var(--grid) 1px, transparent 1px);
            background-size: 80px 80px;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }
        
        .logo-container {
            padding: 24px 32px;
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 400;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--amber);
            letter-spacing: 12px;
            line-height: 1;
        }
        
        .logo-sn {
            font-size: 9px;
            color: var(--text-dim);
            margin-left: 12px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        
        .nav {
            display: flex;
            flex: 1;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-dim);
            border-left: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        
        .nav-item::after {
            content: '+';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 8px;
            opacity: 0.3;
        }
        
        .nav-item:hover, .nav-item.active {
            color: var(--amber);
            background: rgba(217, 131, 36, 0.05);
        }
        
        /* Main layout */
        .main {
            display: grid;
            grid-template-columns: 180px 1fr;
            min-height: 600px;
        }
        
        /* Sidebar */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 24px 16px;
        }
        
        .sidebar-title {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        .stat {
            margin-bottom: 24px;
            padding: 12px;
            border: 1px solid var(--border);
            position: relative;
        }
        
        .stat::before {
            content: '+';
            position: absolute;
            top: -6px;
            left: -6px;
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0.5;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--amber);
            line-height: 1;
        }
        
        .stat-label {
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .scale {
            margin-top: 32px;
        }
        
        .scale-header {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .scale-bar {
            height: 6px;
            background: var(--border);
            position: relative;
            border: 1px solid var(--border);
        }
        
        .scale-fill {
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            background: var(--amber);
        }
        
        .dict {
            margin-top: 32px;
            font-size: 9px;
            line-height: 1.8;
        }
        
        .dict-term {
            color: var(--amber-dim);
            font-weight: 700;
        }
        
        .dict-def {
            color: var(--text-dim);
        }
        
        /* Content */
        .content {
            padding: 24px;
            position: relative;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        /* Grid dots at intersections */
        .content::before {
            content: '+  +  +  +  +  +  +  +  +  +  +  +';
            position: absolute;
            top: 8px;
            right: 16px;
            font-size: 8px;
            color: var(--text-dim);
            opacity: 0.3;
            letter-spacing: 8px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        
        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--amber);
            background: rgba(217, 131, 36, 0.02);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--amber);
            color: var(--amber);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .btn:hover {
            background: var(--amber);
            color: var(--bg);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Results */
        .result-card {
            margin-top: 24px;
            border: 1px solid var(--border);
            padding: 20px;
            position: relative;
        }
        
        .result-card::before {
            content: '+';
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 12px;
            color: var(--amber);
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .avatar {
            width: 56px;
            height: 56px;
            border: 1px solid var(--amber);
            object-fit: cover;
            position: relative;
        }
        
        /* Scanline effect on avatar */
        .avatar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.3) 2px,
                rgba(0,0,0,0.3) 4px
            );
            pointer-events: none;
        }
        
        .user-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        
        .user-info .username {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
            font-family: 'Space Mono', monospace;
        }
        
        .verified {
            display: inline-flex;
            width: 18px;
            height: 18px;
            background: var(--amber);
            color: var(--bg);
            font-size: 10px;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            font-family: 'Space Mono', monospace;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
        }
        
        .stat-box {
            background: var(--bg);
            padding: 16px 12px;
            text-align: center;
        }
        
        .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        
        .stat-box .label {
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        /* Compare */
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            gap: 16px;
            align-items: start;
        }
        
        .compare-vs {
            text-align: center;
            font-size: 14px;
            color: var(--amber);
            padding-top: 40px;
        }
        
        .compare-user {
            border: 1px solid var(--border);
            padding: 16px;
            text-align: center;
        }
        
        .compare-user img {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        
        .compare-user .name {
            font-size: 11px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
        }
        
        /* Score display */
        .score-display {
            text-align: center;
            padding: 48px;
            border: 1px solid var(--border);
            margin: 24px 0;
            position: relative;
        }
        
        .score-display::before {
            content: '[ SCORE ]';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg);
            padding: 0 12px;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        
        .score-value {
            font-size: 80px;
            font-weight: 700;
            color: var(--amber);
            line-height: 1;
        }
        
        .score-label {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-top: 12px;
        }
        
        /* Footer */
        footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--text-dim);
        }
        
        footer .sn {
            font-size: 8px;
            opacity: 0.5;
        }
        
        /* Loading */
        .loading { display: none; padding: 48px; text-align: center; }
        .loading.active { display: block; }
        
        .spinner {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            border-top-color: var(--amber);
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        
        .error {
            display: none;
            padding: 12px 16px;
            border: 1px solid #883333;
            color: #cc4444;
            font-size: 10px;
            margin-top: 16px;
        }
        .error.active { display: block; }
        
        @media (max-width: 700px) {
            .main { grid-template-columns: 1fr; }
            .logo { font-size: 32px; letter-spacing: 6px; }
            .compare-grid { grid-template-columns: 1fr; }
            .compare-vs { display: none; }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo">XSCORE</div>
                <div class="logo-sn">SN-7742</div>
            </div>
            <nav class="nav">
                <div class="nav-item active" data-tab="analyze">ANALYZE</div>
                <div class="nav-item" data-tab="compare">COMPARE</div>
                <div class="nav-item" data-tab="predict">PREDICT</div>
            </nav>
        </header>
        
        <div class="main">
            <aside class="sidebar">
                <div class="sidebar-title">// DATA_01</div>
                
                <div class="stat">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">FOLLOWERS</div>
                </div>
                
                <div class="stat">
                    <div class="stat-value" id="viralScore">0</div>
                    <div class="stat-label">VIRAL_INDEX</div>
                </div>
                
                <div class="scale">
                    <div class="scale-header">
                        <span>COLD</span>
                        <span>HOT</span>
                    </div>
                    <div class="scale-bar">
                        <div class="scale-fill" id="scaleFill" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="dict">
                    <div><span class="dict-term">RETINA</span> <span class="dict-def">[n] display</span></div>
                    <div><span class="dict-term">PUPIL</span> <span class="dict-def">[n] entry</span></div>
                    <div><span class="dict-term">CORnea</span> <span class="dict-def">[n] layer</span></div>
                </div>
            </aside>
            
            <div class="content">
                <span class="sn">ID: x8847a</span>
                
                <!-- Analyze -->
                <div class="section active" id="analyze">
                    <div class="input-group">
                        <label>>> USERNAME</label>
                        <input type="text" id="username" placeholder="@handle">
                    </div>
                    <button class="btn" id="analyzeBtn">ANALYZE</button>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div class="loading-text">PROCESSING...</div>
                    </div>
                    
                    <div class="error" id="error"></div>
                    
                    <div class="result-card" id="result" style="display:none;">
                        <div class="result-header">
                            <img class="avatar" id="avatar" src="">
                            <div class="user-info">
                                <h3><span id="name"></span><span class="verified" id="verified" style="display:none">V</span></h3>
                                <div class="username">@<span id="handle"></span></div>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="value" id="engagement">0%</div>
                                <div class="label">ENG_RATE</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="avgLikes">0</div>
                                <div class="label">AVG_LIKES</div>
                            </div>
                            <div class="stat-box">
                                <div class="value" id="quality">0%</div>
                                <div class="label">QUALITY</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Compare -->
                <div class="section" id="compare">
                    <div class="compare-grid" style="margin-bottom: 20px;">
                        <div class="input-group">
                            <label>>> USER_A</label>
                            <input type="text" id="user1" placeholder="@you">
                        </div>
                        <div class="compare-vs">VS</div>
                        <div class="input-group">
                            <label>>> USER_B</label>
                            <input type="text" id="user2" placeholder="@them">
                        </div>
                    </div>
                    <button class="btn" id="compareBtn">COMPARE</button>
                    
                    <div class="result-card" id="compareResult" style="display:none; margin-top: 24px;">
                        <div class="result-header" style="border: none; margin-bottom: 0; padding-bottom: 0;">
                            <span class="sn">COMPARISON_MATRIX</span>
                        </div>
                        <div class="compare-grid" style="margin-top: 16px;">
                            <div class="compare-user">
                                <img id="avatar1" src="">
                                <div class="name" id="name1"></div>
                                <div class="stat-label" id="v1" style="margin-top:8px;">0</div>
                            </div>
                            <div class="compare-vs" style="padding-top:20px;">&lt;&gt;</div>
                            <div class="compare-user">
                                <img id="avatar2" src="">
                                <div class="name" id="name2"></div>
                                <div class="stat-label" id="v2" style="margin-top:8px;">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Predict -->
                <div class="section" id="predict">
                    <div class="input-group">
                        <label>>> OPERATOR</label>
                        <input type="text" id="predictUser" placeholder="@username">
                    </div>
                    <div class="input-group">
                        <label>>> CONTENT</label>
                        <textarea id="tweetText" placeholder="payload..." rows="4"></textarea>
                    </div>
                    <button class="btn" id="predictBtn">PREDICT</button>
                    
                    <div class="score-display" id="predictResult" style="display:none;">
                        <div class="score-value" id="predictScore">0</div>
                        <div class="score-label">VIRAL_POTENTIAL</div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <span>XSCORE v1.0 // 2024</span>
            <span class="sn">S/N: 8847-A</span>
        </footer>
    </div>
    
    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('.section');
        
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.tab).classList.add('active');
            });
        });
        
        function fmt(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n);
        }
        
        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            let current = 0;
            const step = Math.max(target / 20, 1);
            const timer = setInterval(() => {
                current += step;
                if (current >= target) { el.textContent = fmt(target); clearInterval(timer); }
                else { el.textContent = fmt(Math.floor(current)); }
            }, 20);
        }
        
        async function analyze() {
            const username = document.getElementById('username').value.trim().replace('@', '');
            if (!username) return;
            
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                
                if (!res.ok) throw new Error('NOT_FOUND');
                const d = await res.json();
                
                document.getElementById('avatar').src = d.avatar_url || '';
                document.getElementById('name').textContent = d.display_name;
                document.getElementById('handle').textContent = d.username;
                document.getElementById('verified').style.display = d.verified ? 'inline-flex' : 'none';
                
                animateValue('followers', d.followers);
                animateValue('viralScore', d.viral_score);
                document.getElementById('scaleFill').style.width = d.viral_score + '%';
                
                document.getElementById('engagement').textContent = d.engagement_rate + '%';
                document.getElementById('avgLikes').textContent = d.avg_likes;
                document.getElementById('quality').textContent = d.quality + '%';
                
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = 'ERROR: ' + e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('loading').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = false;
        }
        
        document.getElementById('analyzeBtn').addEventListener('click', analyze);
        document.getElementById('username').addEventListener('keypress', e => { if (e.key === 'Enter') analyze(); });
        
        async function compare() {
            const u1 = document.getElementById('user1').value.trim().replace('@', '');
            const u2 = document.getElementById('user2').value.trim().replace('@', '');
            if (!u1 || !u2) return;
            
            document.getElementById('compareBtn').disabled = true;
            
            try {
                const res = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user1: u1, user2: u2 })
                });
                
                if (!res.ok) throw new Error('NOT_FOUND');
                const d = await res.json();
                
                document.getElementById('avatar1').src = d.user1.avatar_url || '';
                document.getElementById('name1').textContent = d.user1.username;
                document.getElementById('v1').textContent = 'VIRAL: ' + d.user1.viral_score;
                document.getElementById('avatar2').src = d.user2.avatar_url || '';
                document.getElementById('name2').textContent = d.user2.username;
                document.getElementById('v2').textContent = 'VIRAL: ' + d.user2.viral_score;
                
                document.getElementById('compareResult').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = 'ERROR: ' + e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('compareBtn').disabled = false;
        }
        
        document.getElementById('compareBtn').addEventListener('click', compare);
        
        async function predict() {
            const predictUser = document.getElementById('predictUser').value.trim().replace('@', '') || 'user';
            const content = document.getElementById('tweetText').value;
            if (!content) return;
            
            document.getElementById('predictBtn').disabled = true;
            
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: predictUser, content })
                });
                
                const d = await res.json();
                
                document.getElementById('predictScore').textContent = d.score;
                document.getElementById('predictResult').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = 'ERROR: ' + e.message;
                document.getElementById('error').classList.add('active');
            }
            
            document.getElementById('predictBtn').disabled = false;
        }
        
        document.getElementById('predictBtn').addEventListener('click', predict);
    </script>
</body>
</html>
